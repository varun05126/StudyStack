services:
  - type: web
    name: studystack
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: studystack-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DJANGO_ADMIN_USER
        sync: false
      - key: DJANGO_ADMIN_EMAIL
        sync: false
      - key: DJANGO_ADMIN_PASSWORD
        sync: false

databases:
  - name: studystack-db
    databaseName: studystack
    user: studystack
